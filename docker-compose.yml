services:
  # ── Backend (FastAPI) ───────────────────────────────────────
  arrmada-backend:
    build: ./backend
    container_name: arrmada-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8420}:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://arrmada:${POSTGRES_PASSWORD:-arrmada}@arrmada-db:5432/arrmada}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3420,http://192.168.2.3:3420}
      - ARRMADA_AUTH_SECRET=${ARRMADA_AUTH_SECRET:-changeme}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
    depends_on:
      arrmada-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Frontend (Next.js) ──────────────────────────────────────
  # NEXT_PUBLIC_API_URL must be the URL the USER's BROWSER uses to
  # reach the backend — NOT the Docker-internal hostname.
  # Default: http://localhost:8420 (same machine, default port)
  arrmada-frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8420}
    container_name: arrmada-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3420}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8420}
    depends_on:
      arrmada-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── PostgreSQL ──────────────────────────────────────────────
  # Integrated by default. To use an EXTERNAL PostgreSQL instead,
  # remove this service and set DATABASE_URL in the backend env.
  arrmada-db:
    image: postgres:16-alpine
    container_name: arrmada-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: arrmada
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arrmada}
      POSTGRES_DB: arrmada
    volumes:
      - arrmada-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arrmada"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    # Port NOT exposed by default (only accessible inside Docker network)
    # Uncomment to access from host tools (pgAdmin, DBeaver, etc.):
    # ports:
    #   - "5432:5432"

volumes:
  arrmada-pgdata:

networks:
  default:
    name: arrmada-network
